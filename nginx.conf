server {
    listen 80;
    server_name wow.idzlink.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wow.idzlink.com;

    # SSL — update to your actual cert paths
    # ssl_certificate     /etc/letsencrypt/live/wow.idzlink.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wow.idzlink.com/privkey.pem;

    client_max_body_size 10M;

    # API requests → Express on port 5000
    location /api {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else → Next.js on port 3000
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
