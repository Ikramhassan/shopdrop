name: Deploy to wow.idzlink.com

on:
  push:
    branches:
      - master

env:
  APP_DIR: /home/ikram/shopdrop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_DIR
          script: |
            APP_DIR=/home/ikram/shopdrop

            echo "=== Pulling latest code ==="
            cd $APP_DIR
            git pull origin master

            echo "=== Writing .env ==="
            printf 'PORT=5000\n' > $APP_DIR/server/.env
            printf 'NODE_ENV=production\n' >> $APP_DIR/server/.env
            printf 'JWT_SECRET="${{ secrets.JWT_SECRET }}"\n' >> $APP_DIR/server/.env
            printf 'ALLOWED_ORIGINS="https://wow.idzlink.com,http://localhost:3000"\n' >> $APP_DIR/server/.env
            printf 'ALIEXPRESS_APP_KEY="${{ secrets.ALIEXPRESS_APP_KEY }}"\n' >> $APP_DIR/server/.env
            printf 'ALIEXPRESS_APP_SECRET="${{ secrets.ALIEXPRESS_APP_SECRET }}"\n' >> $APP_DIR/server/.env

            echo "=== Installing server dependencies ==="
            cd $APP_DIR/server
            npm install --omit=dev

            echo "=== Installing client dependencies & building ==="
            cd $APP_DIR/client
            npm install
            npm run build

            echo "=== Running DB seed/migrations ==="
            cd $APP_DIR/server
            node src/seed.js

            echo "=== Restarting PM2 ==="
            pm2 restart shopdrop || pm2 start src/index.js --name shopdrop
            pm2 save

            echo "=== Deploy complete ==="
            pm2 list
